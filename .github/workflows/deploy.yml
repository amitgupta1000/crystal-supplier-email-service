name: Deploy to GCP Cloud Run

on:
  push:
    branches:
      - main
      - production
  pull_request:
    branches:
      - main

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  SERVICE_NAME: crystal-supplier-email-service
  REGISTRY: us-central1-docker.pkg.dev

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker $REGION-docker.pkg.dev

      - name: Build Docker image
        run: |
          docker build -t $REGION-docker.pkg.dev/$PROJECT_ID/crystal-repo/$SERVICE_NAME:$GITHUB_SHA .
          docker tag $REGION-docker.pkg.dev/$PROJECT_ID/crystal-repo/$SERVICE_NAME:$GITHUB_SHA \
                     $REGION-docker.pkg.dev/$PROJECT_ID/crystal-repo/$SERVICE_NAME:latest

      - name: Push Docker image
        run: |
          docker push $REGION-docker.pkg.dev/$PROJECT_ID/crystal-repo/$SERVICE_NAME:$GITHUB_SHA
          docker push $REGION-docker.pkg.dev/$PROJECT_ID/crystal-repo/$SERVICE_NAME:latest

      - name: Deploy to Cloud Run
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production'
        run: |
          gcloud run deploy $SERVICE_NAME \
            --image=$REGION-docker.pkg.dev/$PROJECT_ID/crystal-repo/$SERVICE_NAME:$GITHUB_SHA \
            --region=$REGION \
            --platform=managed \
            --update-env-vars=DEPLOYMENT_SHA=$GITHUB_SHA,DEPLOYMENT_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')

      - name: Notify Deployment
        if: success()
        run: |
          echo "Deployment successful!"
          echo "Image: $REGION-docker.pkg.dev/$PROJECT_ID/crystal-repo/$SERVICE_NAME:$GITHUB_SHA"

      - name: Notify Failure
        if: failure()
        run: |
          echo "Deployment failed!"
          exit 1

  lint-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pylint black

      - name: Lint backend code
        run: |
          pylint backend/*.py main.py --disable=all --enable=E,F || true
          black --check backend/*.py main.py --line-length=100 || true

      - name: Run backend tests
        run: |
          pytest --tb=short || true

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Lint frontend code
        run: |
          cd frontend
          npm run lint

      - name: Build frontend
        run: |
          cd frontend
          npm run build

  security-scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy security scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
